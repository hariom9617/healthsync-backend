<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Manrope:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#005a3c",
                        "inverse-on-surface": "#9a9d9f",
                        "surface-container": "#e5e9eb",
                        "surface": "#f5f7f9",
                        "secondary-fixed-dim": "#7ae7d8",
                        "outline-variant": "#abadaf",
                        "on-tertiary": "#c8ffe0",
                        "background": "#f5f7f9",
                        "secondary-dim": "#005a52",
                        "inverse-surface": "#0b0f10",
                        "error-container": "#fb5151",
                        "on-primary": "#c8ffe1",
                        "primary": "#006948",
                        "on-secondary-fixed": "#004841",
                        "on-secondary-container": "#005c54",
                        "tertiary-container": "#69f6b8",
                        "on-tertiary-fixed-variant": "#006544",
                        "primary-fixed": "#7ff3be",
                        "primary-container": "#7ff3be",
                        "on-error-container": "#570008",
                        "tertiary-fixed": "#69f6b8",
                        "surface-bright": "#f5f7f9",
                        "tertiary": "#006947",
                        "surface-variant": "#d9dde0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#00675e",
                        "secondary": "#00675e",
                        "on-primary-fixed-variant": "#006545",
                        "on-surface": "#2c2f31",
                        "on-primary-fixed": "#00452e",
                        "tertiary-fixed-dim": "#58e7ab",
                        "surface-container-highest": "#d9dde0",
                        "surface-container-low": "#eef1f3",
                        "error-dim": "#9f0519",
                        "tertiary-dim": "#005c3d",
                        "on-background": "#2c2f31",
                        "secondary-fixed": "#89f5e7",
                        "surface-container-high": "#dfe3e6",
                        "on-tertiary-fixed": "#00452d",
                        "on-error": "#ffefee",
                        "outline": "#747779",
                        "primary-dim": "#005b3e",
                        "on-secondary": "#bffff5",
                        "primary-fixed-dim": "#71e4b1",
                        "secondary-container": "#89f5e7",
                        "inverse-primary": "#7ff3be",
                        "error": "#b31b25",
                        "on-surface-variant": "#595c5e",
                        "on-primary-container": "#005a3d",
                        "surface-tint": "#006948",
                        "surface-dim": "#d0d5d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        .clinical-gradient {
            background: linear-gradient(135deg, #006948 0%, #00452e 100%);
        }

        .soft-glow {
            box-shadow: 0 0 60px 10px rgba(127, 243, 190, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }

        /* Loading animation keyframes */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes pulse-opacity {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        .spinner-ring {
            animation: spin 1.4s linear infinite;
            transform-origin: 32px 32px;
        }

        .spinner-ring-slow {
            animation: spin-reverse 2.2s linear infinite;
            transform-origin: 32px 32px;
        }

        .dot-pulse {
            animation: pulse-opacity 1.4s ease-in-out infinite;
        }

        .dot-pulse:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot-pulse:nth-child(3) {
            animation-delay: 0.4s;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="h-full bg-surface antialiased overflow-hidden">

    <main class="relative h-full w-full flex items-center justify-center clinical-gradient">

        <!-- Abstract Decorative Elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-[80px]"></div>
            <div class="absolute top-1/2 -right-32 w-80 h-80 bg-tertiary-container/5 rounded-full blur-[100px]"></div>
            <div
                class="absolute -bottom-40 left-1/2 -translate-x-1/2 w-[120%] h-96 bg-on-primary-fixed/20 rounded-[100%] blur-[120px]">
            </div>
        </div>

        <!-- Central Identity Cluster -->
        <div class="relative z-10 flex flex-col items-center justify-center px-8 text-center">

            <!-- Logo Icon -->
            <div class="mb-8 p-6 bg-white/10 backdrop-blur-xl rounded-[2.5rem] soft-glow border border-white/10">
                <span class="material-symbols-outlined text-white text-8xl"
                    style="font-variation-settings: 'FILL' 1, 'wght' 300;">
                    spa
                </span>
            </div>

            <!-- Brand Name -->
            <h1 class="text-white font-headline font-black text-4xl tracking-tighter mb-3">
                HealthSync
            </h1>

            <!-- Tagline -->
            <p class="text-primary-fixed font-body font-medium text-lg tracking-wide opacity-90">
                Your AI-Powered Health Companion
            </p>
        </div>

        <!-- Footer: Loading Animation (replaces cube texture) -->
        <div class="absolute bottom-16 flex flex-col items-center gap-6">

            <!-- Double-ring spinner -->
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer track -->
                <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,0.15)" stroke-width="3" />
                <!-- Outer spinning arc -->
                <circle cx="32" cy="32" r="28" stroke="#7ff3be" stroke-width="3" stroke-dasharray="44 132"
                    stroke-linecap="round" class="spinner-ring" />
                <!-- Inner track -->
                <circle cx="32" cy="32" r="18" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" />
                <!-- Inner spinning arc (counter-rotate) -->
                <circle cx="32" cy="32" r="18" stroke="rgba(127,243,190,0.6)" stroke-width="2.5"
                    stroke-dasharray="22 92" stroke-linecap="round" class="spinner-ring-slow" />
                <!-- Center dot -->
                <circle cx="32" cy="32" r="4" fill="#7ff3be" opacity="0.8" />
            </svg>

            <!-- Pulsing dot indicators -->
            <div style="display:flex; gap:6px; align-items:center;">
                <div class="dot-pulse"
                    style="width:6px;height:6px;border-radius:9999px;background:rgba(127,243,190,0.7);"></div>
                <div class="dot-pulse"
                    style="width:6px;height:6px;border-radius:9999px;background:rgba(127,243,190,0.7);"></div>
                <div class="dot-pulse"
                    style="width:6px;height:6px;border-radius:9999px;background:rgba(127,243,190,0.7);"></div>
            </div>

        </div>

    </main>
</body>

</html>
